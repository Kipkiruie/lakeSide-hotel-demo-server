# =========================
# SERVER CONFIG
# =========================
server.port=${PORT:8080}

# =========================
# DATABASE CONFIG (RAILWAY)
# =========================
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# =========================
# FILE UPLOAD CONFIG
# =========================
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# =========================
# LOGGING
# =========================
logging.level.org.springframework=INFO
logging.level.com.dailycodework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

# =========================
# ERROR HANDLING
# =========================
server.error.include-message=always
server.error.include-binding-errors=always

# =========================
# JWT AUTH (USE ENV VARIABLES)
# =========================
auth.token.expirationInMils=3600000
auth.token.jwtSecret=${JWT_SECRET}

# =========================
# MPESA CONFIG (USE ENV VARIABLES)
# =========================
mpesa.consumer.key=${MPESA_CONSUMER_KEY}
mpesa.consumer.secret=${MPESA_CONSUMER_SECRET}
mpesa.shortcode=174379
mpesa.passkey=${MPESA_PASSKEY}